ai:
  agent:
    config:
      tables:
        testAgent03:
          app-name: testAgent03
          agent:
            agent-id: 100003
            agent-name: 单一智能体
            agent-desc: 单一智能体
          module:
            ai-api:
              base-url: ${AI_BASE_URL}
              api-key: ${AI_AGENT_OPENAI_API_KEY}
              completions-path: ${AI_COMPLETIONS_PATH}
              embeddings-path: v1/embeddings
            chat-model:
              model: ${AI_MODEL}
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: https://appbuilder.baidu.com/v2/ai_search/mcp/
                    sse-endpoint: sse?api_key=${AI_AGENT_MCP_API_KEY}
                    request-timeout: 30000
            agents:
              - name: onlyAgent
                description: AI 编程学习项目计划
                instruction: |
                  通过百度检索 AI 编程实战项目，并根据检索内容，针对初学用户给出学习计划。
            runner:
              agent-name: onlyAgent
              plugin-name-list:
                - myTestPlugin

